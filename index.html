<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISTQB Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --neutral: #6b7280;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 760px;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary   { background: var(--primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--primary-hover); }
    .btn-outline   { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:not(:disabled):hover { background: var(--bg); }
    .btn-danger    { background: #fff; color: var(--error); border: 1px solid #fca5a5; }
    .btn-danger:not(:disabled):hover  { background: var(--error-bg); }

    #main {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── empty state ── */
    .empty-state {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state h2 { font-size: 1.125rem; margin-bottom: 8px; color: var(--text); }
    .empty-state p  { font-size: 0.875rem; margin-bottom: 20px; }

    /* ── progress bar ── */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── stats row ── */
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 100px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }

    .stat-card .val {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card .lbl {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .val-correct { color: var(--success); }
    .val-wrong   { color: var(--error); }
    .val-remain  { color: var(--primary); }

    /* ── question card ── */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .question-number {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.9375rem;
      line-height: 1.5;
      text-align: left;
      background: #fff;
      width: 100%;
    }

    .option:not(:disabled):hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .option:disabled { cursor: default; }

    .option.correct  { border-color: var(--success); background: var(--success-bg); }
    .option.wrong    { border-color: var(--error);   background: var(--error-bg); }
    .option.revealed { border-color: var(--success); background: var(--success-bg); }

    .option-label {
      font-weight: 600;
      min-width: 22px;
      color: var(--text-muted);
    }

    .option.correct  .option-label,
    .option.revealed .option-label { color: var(--success); }
    .option.wrong    .option-label { color: var(--error); }
    .option.selected-multi { border-color: var(--primary); background: #eff6ff; }

    /* ── feedback ── */
    .feedback {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .feedback.correct { background: var(--success-bg); border-left: 4px solid var(--success); }
    .feedback.wrong   { background: var(--error-bg);   border-left: 4px solid var(--error); }

    .feedback-verdict {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .feedback.correct .feedback-verdict { color: var(--success); }
    .feedback.wrong   .feedback-verdict { color: var(--error); }

    .feedback-explanation { color: var(--text); }

    /* ── next / done ── */
    .card-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .card-footer > .btn:last-child { margin-left: auto; }

    /* ── completion card ── */
    .completion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
      text-align: center;
    }

    .completion-card h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
    }

    .completion-card p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 0.9375rem;
    }

    .score-big {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* ── flag button ── */
    .btn-flag {
      background: #fff;
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .btn-flag:hover { background: #fffbeb; border-color: #f59e0b; color: #d97706; }
    .btn-flag.flagged { background: #fffbeb; border-color: #f59e0b; color: #d97706; font-weight: 600; }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .question-header .question-number { margin-bottom: 0; }

    /* ── hidden ── */
    .hidden { display: none !important; }

    /* ── cert selector ── */
    .cert-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    .cert-select:focus { outline: 2px solid var(--primary); outline-offset: 1px; }

    /* ── file input trick ── */
    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <h1>ISTQB Coach</h1>
  <p id="header-subtitle">Practice questions for the ISTQB Advanced Level Test Manager certification</p>
  <div class="toolbar">
    <select id="cert-select" class="cert-select" onchange="onCertChange(this.value)">
      <option value="ISTQB-A-TM"  selected>Advanced Test Manager</option>
      <option value="ISTQB-A-TAE">Advanced Test Automation Engineer</option>
      <option value="ISTQB-A-TA" >Advanced Test Analyst</option>
      <option value="ISTQB-A-TTA">Advanced Technical Test Analyst</option>
      <option value="ISTQB-FL"   >Foundation Level</option>
    </select>
    <button class="btn btn-primary" onclick="triggerImport()">Import session (JSON)</button>
    <button class="btn btn-outline" id="btn-export" onclick="exportSession()" disabled>Save session (JSON)</button>
    <button class="btn btn-danger"  id="btn-reset"  onclick="resetSession()"    disabled>Reset session</button>
  </div>
  <input type="file" id="file-input" accept=".json,application/json" onchange="importFile(event)">
</header>

<div id="main">
  <!-- empty state -->
  <div class="empty-state" id="empty-state">
    <h2>No questions loaded</h2>
    <p>Select a certification from the toolbar and click Load, or import a previously saved session.</p>
    <button class="btn btn-primary" onclick="loadCert()">Load questions</button>
  </div>

  <!-- progress (hidden until questions loaded) -->
  <div id="progress-section" class="hidden">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-meta">
      <span id="progress-text">0 / 0 answered</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <!-- stats (hidden until questions loaded) -->
  <div class="stats hidden" id="stats-section">
    <div class="stat-card">
      <div class="val val-remain" id="stat-remain">0</div>
      <div class="lbl">Remaining</div>
    </div>
    <div class="stat-card">
      <div class="val val-correct" id="stat-correct">0</div>
      <div class="lbl">Correct</div>
    </div>
    <div class="stat-card">
      <div class="val val-wrong" id="stat-wrong">0</div>
      <div class="lbl">Incorrect</div>
    </div>
    <div class="stat-card">
      <div class="val" id="stat-total">0</div>
      <div class="lbl">Total</div>
    </div>
  </div>

  <!-- question card (hidden until active) -->
  <div class="question-card hidden" id="question-card">
    <div class="question-header">
      <div class="question-number" id="q-number"></div>
      <button class="btn btn-flag" id="btn-flag" onclick="toggleFlag()">&#9873; Flag</button>
    </div>
    <div class="question-text"   id="q-text"></div>
    <div class="options"         id="q-options"></div>
    <div class="feedback hidden" id="q-feedback">
      <div class="feedback-verdict"     id="fb-verdict"></div>
      <div class="feedback-explanation" id="fb-explanation"></div>
    </div>
    <div class="card-footer">
      <button class="btn hidden" id="btn-back" onclick="goBack()">&#8592; Previous</button>
      <button class="btn btn-primary hidden" id="btn-next" onclick="nextQuestion()">Next question</button>
    </div>
  </div>

  <!-- completion card (hidden until done) -->
  <div class="completion-card hidden" id="completion-card">
    <div class="score-big" id="final-score"></div>
    <h2>Session complete!</h2>
    <p id="final-detail"></p>
    <button class="btn btn-primary" onclick="restartSession()">Start over</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let questions   = [];      // all loaded questions
let queue       = [];      // indices of unanswered questions (shuffled)
let currentIdx  = null;    // index into `questions` of current question
let previousIdx = null;    // index of previous question (for going back to flag)
let answered    = {};      // { questionIndex: { chosen, correct } }
let flagged     = {};      // { questionIndex: true }
let sessionCorrect = 0;
let sessionWrong   = 0;
let currentCert = 'ISTQB-A-TM';

const CERT_LABELS = {
  'ISTQB-A-TM':  'Advanced Level Test Manager',
  'ISTQB-A-TAE': 'Advanced Level Test Automation Engineer',
  'ISTQB-A-TA':  'Advanced Level Test Analyst',
  'ISTQB-A-TTA': 'Advanced Level Technical Test Analyst',
  'ISTQB-FL':    'Foundation Level',
};

// ── Import / Export ────────────────────────────────────────────────────────
function triggerImport() {
  document.getElementById('file-input').value = '';
  document.getElementById('file-input').click();
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Session file saved by this app
      if (data && typeof data === 'object' && !Array.isArray(data) && data._sessionVersion) {
        restoreSession(data);
        return;
      }
      // Plain questions array (legacy / external)
      if (Array.isArray(data) && data.length > 0) {
        loadQuestions(data);
        return;
      }
      alert('Invalid format: expected a saved session file or a non-empty JSON array of questions.');
    } catch {
      alert('Could not parse JSON file. Please check the file format.');
    }
  };
  reader.readAsText(file);
}

function exportSession() {
  if (questions.length === 0) return;
  // If user is mid-question (not yet answered), put it back at the front of the queue
  const queueToSave = (currentIdx !== null && !(String(currentIdx) in answered) && !(currentIdx in answered))
    ? [currentIdx, ...queue]
    : [...queue];
  const session = {
    _sessionVersion: 1,
    savedAt: new Date().toISOString(),
    questions,
    answered,
    flagged,
    queue: queueToSave,
    sessionCorrect,
    sessionWrong
  };
  const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `istqb_session_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function restoreSession(session) {
  if (!Array.isArray(session.questions) || session.questions.length === 0) {
    alert('Session file is missing questions data.');
    return;
  }
  questions      = session.questions;
  answered       = session.answered       || {};
  flagged        = session.flagged        || {};
  queue          = session.queue          || [];
  sessionCorrect = session.sessionCorrect || 0;
  sessionWrong   = session.sessionWrong   || 0;
  currentIdx     = null;

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('completion-card').classList.add('hidden');
  document.getElementById('btn-export').disabled = false;
  document.getElementById('btn-reset').disabled  = false;

  updateStats();
  if (queue.length > 0) {
    showNextQuestion();
  } else {
    showCompletion();
  }
}

function onCertChange(cert) {
  if (questions.length > 0) {
    if (!confirm('Loading a new certification will reset your current session. Continue?')) {
      document.getElementById('cert-select').value = currentCert;
      return;
    }
  }
  loadCert(cert);
}

function loadCert(cert) {
  cert = cert || document.getElementById('cert-select').value;
  currentCert = cert;
  document.getElementById('cert-select').value = cert;
  document.getElementById('header-subtitle').textContent =
    `Practice questions for the ISTQB ${CERT_LABELS[cert]} certification`;
  fetch(`${cert}.json`)
    .then(r => r.json())
    .then(data => loadQuestions(data))
    .catch(() => {
      alert(`Could not load ${cert}.json. Please use Import to load a questions file.`);
    });
}

function loadSample() {
  loadCert('ISTQB-A-TM');
}

// ── Session management ─────────────────────────────────────────────────────
function loadQuestions(data) {
  questions      = data;
  answered       = {};
  flagged        = {};
  sessionCorrect = 0;
  sessionWrong   = 0;
  queue          = shuffle([...Array(questions.length).keys()]);

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('completion-card').classList.add('hidden');
  document.getElementById('btn-export').disabled = false;
  document.getElementById('btn-reset').disabled  = false;

  updateStats();
  showNextQuestion();
}

function resetSession() {
  if (!confirm('Reset your progress and start over with the same questions?')) return;
  answered       = {};
  flagged        = {};
  previousIdx    = null;
  sessionCorrect = 0;
  sessionWrong   = 0;
  queue          = shuffle([...Array(questions.length).keys()]);

  document.getElementById('completion-card').classList.add('hidden');
  updateStats();
  showNextQuestion();
}

function restartSession() {
  resetSession();
}

// ── Question display ───────────────────────────────────────────────────────
function showNextQuestion() {
  if (queue.length === 0) {
    showCompletion();
    return;
  }

  previousIdx = currentIdx;
  currentIdx  = queue.shift();
  const q    = questions[currentIdx];
  const num  = Object.keys(answered).length + 1;

  document.getElementById('q-number').textContent =
    `Question ${num} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.question;

  const labels  = ['A', 'B', 'C', 'D', 'E', 'F'];
  const optsCtr = document.getElementById('q-options');
  optsCtr.innerHTML = '';

  const isMulti = Array.isArray(q.correct);

  q.options.forEach((opt, i) => {
    const btn       = document.createElement('button');
    btn.className   = 'option';
    btn.dataset.idx = i;
    btn.innerHTML   = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    if (isMulti) {
      btn.onclick = () => toggleMultiOption(btn);
    } else {
      btn.onclick = () => selectAnswer(i);
    }
    optsCtr.appendChild(btn);
  });

  if (isMulti) {
    // Add submit button for multi-select questions
    const hint = document.createElement('p');
    hint.id = 'multi-hint';
    hint.style.cssText = 'font-size:0.8rem;color:var(--text-muted);margin-top:8px;';
    hint.textContent = `Select ${q.correct.length} options, then click Submit.`;
    optsCtr.after(hint);

    const submitBtn = document.createElement('button');
    submitBtn.id        = 'btn-submit-multi';
    submitBtn.className = 'btn btn-primary';
    submitBtn.style.cssText = 'margin-top:12px;';
    submitBtn.textContent = 'Submit';
    submitBtn.onclick   = () => submitMultiAnswer();
    hint.after(submitBtn);
  }

  const flagBtn = document.getElementById('btn-flag');
  if (flagged[currentIdx]) {
    flagBtn.classList.add('flagged');
    flagBtn.textContent = '\u2691 Flagged';
  } else {
    flagBtn.classList.remove('flagged');
    flagBtn.textContent = '\u2873 Flag';
  }

  document.getElementById('q-feedback').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-back').classList.toggle('hidden', previousIdx === null);
  document.getElementById('question-card').classList.remove('hidden');
  document.getElementById('progress-section').classList.remove('hidden');
  document.getElementById('stats-section').classList.remove('hidden');

  updateStats();
}

function selectAnswer(chosenIdx) {
  const q       = questions[currentIdx];
  const correct = q.correct;  // single index
  const isRight = chosenIdx === correct;

  const buttons = document.querySelectorAll('.option');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct)   btn.classList.add('revealed');
    if (i === chosenIdx && !isRight) { btn.classList.remove('revealed'); btn.classList.add('wrong'); }
    if (i === chosenIdx && isRight)  { btn.classList.remove('revealed'); btn.classList.add('correct'); }
  });

  answered[currentIdx] = { chosen: chosenIdx, correct: isRight };
  if (isRight) sessionCorrect++; else sessionWrong++;

  showFeedback(isRight, q.explanation);
}

function toggleMultiOption(btn) {
  btn.classList.toggle('selected-multi');
  // visual cue: bold border when selected
  if (btn.classList.contains('selected-multi')) {
    btn.style.borderColor = 'var(--primary)';
    btn.style.background  = '#eff6ff';
  } else {
    btn.style.borderColor = '';
    btn.style.background  = '';
  }
}

function submitMultiAnswer() {
  const q = questions[currentIdx];
  const correctSet = new Set(q.correct);

  const buttons = document.querySelectorAll('.option');
  const chosen  = new Set();
  buttons.forEach((btn, i) => {
    if (btn.classList.contains('selected-multi')) chosen.add(i);
  });

  const isRight = chosen.size === correctSet.size &&
                  [...chosen].every(i => correctSet.has(i));

  // Remove submit button and hint
  const sb = document.getElementById('btn-submit-multi');
  const mh = document.getElementById('multi-hint');
  if (sb) sb.remove();
  if (mh) mh.remove();

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    btn.style.borderColor = '';
    btn.style.background  = '';
    if (correctSet.has(i))  btn.classList.add('revealed');
    if (chosen.has(i) && !correctSet.has(i)) { btn.classList.remove('revealed'); btn.classList.add('wrong'); }
    if (chosen.has(i) &&  correctSet.has(i)) { btn.classList.remove('revealed'); btn.classList.add('correct'); }
  });

  answered[currentIdx] = { chosen: [...chosen], correct: isRight };
  if (isRight) sessionCorrect++; else sessionWrong++;

  showFeedback(isRight, q.explanation);
}

function showFeedback(isRight, explanation) {
  const fb = document.getElementById('q-feedback');
  fb.className = `feedback ${isRight ? 'correct' : 'wrong'}`;
  document.getElementById('fb-verdict').textContent = isRight ? 'Correct!' : 'Incorrect';
  document.getElementById('fb-explanation').textContent = explanation || 'No explanation provided.';
  fb.classList.remove('hidden');
  document.getElementById('btn-next').classList.remove('hidden');
  updateStats();
}

function toggleFlag() {
  if (currentIdx === null) return;
  const flagBtn = document.getElementById('btn-flag');
  if (flagged[currentIdx]) {
    delete flagged[currentIdx];
    flagBtn.classList.remove('flagged');
    flagBtn.textContent = '\u2873 Flag';
  } else {
    flagged[currentIdx] = true;
    flagBtn.classList.add('flagged');
    flagBtn.textContent = '\u2691 Flagged';
  }
}

function goBack() {
  if (previousIdx === null) return;
  queue.unshift(currentIdx);   // put current (unanswered) question back
  currentIdx  = previousIdx;
  previousIdx = null;
  renderQuestionAnswered();
}

function renderQuestionAnswered() {
  const q      = questions[currentIdx];
  const ans    = answered[currentIdx];
  const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
  const num    = Object.keys(answered).length;

  document.getElementById('q-number').textContent = `Question ${num} of ${questions.length}`;
  document.getElementById('q-text').textContent   = q.question;

  const optsCtr = document.getElementById('q-options');
  optsCtr.innerHTML = '';

  const isMulti = Array.isArray(q.correct);

  q.options.forEach((opt, i) => {
    const btn       = document.createElement('button');
    btn.className   = 'option';
    btn.disabled    = true;
    btn.innerHTML   = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;

    if (isMulti) {
      const correctSet = new Set(q.correct);
      const chosenSet  = new Set(ans.chosen);
      if (correctSet.has(i))                           btn.classList.add('revealed');
      if (chosenSet.has(i) && !correctSet.has(i)) { btn.classList.remove('revealed'); btn.classList.add('wrong'); }
      if (chosenSet.has(i) &&  correctSet.has(i)) { btn.classList.remove('revealed'); btn.classList.add('correct'); }
    } else {
      const correct = q.correct;
      const chosen  = ans.chosen;
      if (i === correct)                           btn.classList.add('revealed');
      if (i === chosen && chosen !== correct) { btn.classList.remove('revealed'); btn.classList.add('wrong'); }
      if (i === chosen && chosen === correct) { btn.classList.remove('revealed'); btn.classList.add('correct'); }
    }
    optsCtr.appendChild(btn);
  });

  const flagBtn = document.getElementById('btn-flag');
  if (flagged[currentIdx]) {
    flagBtn.classList.add('flagged');
    flagBtn.textContent = '\u2691 Flagged';
  } else {
    flagBtn.classList.remove('flagged');
    flagBtn.textContent = '\u2873 Flag';
  }

  showFeedback(ans.correct, q.explanation);
  document.getElementById('btn-back').classList.add('hidden');
  document.getElementById('question-card').classList.remove('hidden');
  document.getElementById('progress-section').classList.remove('hidden');
  document.getElementById('stats-section').classList.remove('hidden');
  updateStats();
}

function nextQuestion() {
  if (queue.length === 0) {
    showCompletion();
  } else {
    showNextQuestion();
  }
}

function showCompletion() {
  document.getElementById('question-card').classList.add('hidden');
  const total = questions.length;
  const pct   = total > 0 ? Math.round((sessionCorrect / total) * 100) : 0;
  document.getElementById('final-score').textContent  = `${pct}%`;
  document.getElementById('final-detail').textContent =
    `You answered ${sessionCorrect} out of ${total} questions correctly (${sessionWrong} incorrect).`;
  document.getElementById('completion-card').classList.remove('hidden');
  updateStats();
}

// ── Stats & Progress ───────────────────────────────────────────────────────
function updateStats() {
  const total    = questions.length;
  const done     = Object.keys(answered).length;
  const remain   = total - done;
  const pct      = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-remain').textContent  = remain;
  document.getElementById('stat-correct').textContent = sessionCorrect;
  document.getElementById('stat-wrong').textContent   = sessionWrong;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent  = `${done} / ${total} answered`;
  document.getElementById('progress-pct').textContent   = pct + '%';
}

// ── Auto-load on startup ──────────────────────────────────────────────────
loadCert('ISTQB-A-TM');

// ── Utility ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
